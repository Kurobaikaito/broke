<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A股研究工作台</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-block">
        <h1>A股研究工作台</h1>
        <p id="tradeMeta">--</p>
      </div>
      <nav class="main-tabs" aria-label="主导航">
        <button class="main-tab active" type="button" data-view="analysisView">选股分析</button>
        <button class="main-tab" type="button" data-view="dataView">数据管理</button>
      </nav>
      <div class="status-group">
        <span id="modeBadge" class="badge">连接中</span>
        <button id="refreshBtn" class="primary-btn" type="button">刷新</button>
      </div>
    </header>

    <main class="layout">
      <div id="analysisView" class="view">
        <section class="toolbar" aria-label="筛选条件">
          <div class="segmented" role="tablist" aria-label="预测周期">
            <button class="segment active" type="button" data-horizon="5d">5日</button>
            <button class="segment" type="button" data-horizon="20d">20日</button>
            <button class="segment" type="button" data-horizon="60d">60日</button>
          </div>
          <label>
            数量
            <select id="limitSelect">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="50">50</option>
            </select>
          </label>
          <label>
            最低评分
            <input id="minScoreInput" type="number" step="0.01" placeholder="不限" />
          </label>
        </section>

        <section class="kpi-grid" aria-label="回测摘要">
          <article class="metric"><span>Top组收益</span><strong id="topReturn">--</strong></article>
          <article class="metric"><span>基准收益</span><strong id="benchmarkReturn">--</strong></article>
          <article class="metric"><span>胜率</span><strong id="winRate">--</strong></article>
          <article class="metric"><span>Rank IC</span><strong id="rankIc">--</strong></article>
        </section>

        <section class="content-grid">
          <section class="panel recommendations-panel">
            <div class="panel-header"><h2>今日推荐</h2><span id="resultCount">0只</span></div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>排名</th><th>代码</th><th>名称</th><th>行业</th><th>评分</th><th>上涨概率</th><th>风险</th></tr></thead>
                <tbody id="recommendationBody"><tr><td colspan="7" class="empty">加载中</td></tr></tbody>
              </table>
            </div>
          </section>
          <aside class="panel explain-panel">
            <div class="panel-header"><h2>个股解释</h2><span id="selectedCode">--</span></div>
            <div id="explainBody" class="explain-body"><p class="empty">选择一只股票</p></div>
          </aside>
        </section>
      </div>

      <div id="dataView" class="view" hidden>
        <div class="page-heading">
          <div><h2>数据管理</h2><p id="dataCheckpoint">同步断点 --</p></div>
          <button id="inventoryRefreshBtn" class="secondary-btn" type="button">刷新存量</button>
        </div>

        <section class="data-grid">
          <section class="panel sync-config-panel">
            <div class="panel-header"><h2>Tushare 配置</h2><span id="tokenStatus">未检测</span></div>
            <form id="syncForm" class="sync-form">
              <label class="full-field">
                接口 Token
                <div class="input-action-row">
                  <input id="tokenInput" type="password" autocomplete="off" placeholder="保留为空则使用已保存 Token" />
                  <button id="saveTokenBtn" class="secondary-btn" type="button">保存</button>
                </div>
              </label>
              <label>开始日期<input id="startDateInput" type="date" required /></label>
              <label>结束日期<input id="endDateInput" type="date" /></label>
              <label>Sleep 秒数<input id="sleepInput" type="number" min="0" max="60" step="0.1" value="0.8" required /></label>
              <label>失败重试<input id="retryInput" type="number" min="1" max="10" step="1" value="3" required /></label>
              <label class="check-field full-field"><input id="continueInput" type="checkbox" />失败后继续</label>
              <label class="check-field full-field"><input id="checkpointInput" type="checkbox" checked />从安全断点续传</label>
              <div class="form-actions full-field">
                <button id="startSyncBtn" class="primary-btn" type="submit">启动拉取</button>
                <button id="stopSyncBtn" class="danger-btn" type="button" disabled>停止</button>
              </div>
            </form>
          </section>

          <section class="panel sync-progress-panel">
            <div class="panel-header"><h2>拉取进度</h2><span id="syncStatusBadge" class="status-text">空闲</span></div>
            <div class="progress-content">
              <div class="progress-summary"><strong id="progressPercent">0%</strong><span id="progressMessage">暂无运行中的任务</span></div>
              <div class="progress-track" aria-label="同步进度"><span id="progressBar"></span></div>
              <div class="progress-meta">
                <span>当前日期 <strong id="currentSyncDate">--</strong></span>
                <span>交易日 <strong id="dateProgress">0 / 0</strong></span>
              </div>
            </div>
            <div class="sync-stats">
              <div><span>原始行情</span><strong id="rawRows">0</strong></div>
              <div><span>复权行情</span><strong id="adjustedRows">0</strong></div>
              <div><span>复权因子</span><strong id="factorRows">0</strong></div>
              <div><span>每日指标</span><strong id="basicRows">0</strong></div>
            </div>
          </section>
        </section>

        <section class="panel inventory-panel">
          <div class="panel-header"><h2>数据存量</h2><span>MySQL 估算行数</span></div>
          <div class="table-wrap">
            <table class="inventory-table">
              <thead><tr><th>数据表</th><th>估算行数</th><th>开始日期</th><th>结束日期</th></tr></thead>
              <tbody id="inventoryBody"><tr><td colspan="4" class="empty">加载中</td></tr></tbody>
            </table>
          </div>
        </section>

        <section class="panel log-panel">
          <div class="panel-header"><h2>任务日志</h2><span id="jobIdText">--</span></div>
          <div id="syncLogs" class="sync-logs"><p class="empty">暂无日志</p></div>
        </section>
      </div>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
